<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Precision Step Fit Pro | Arvind Kumar Shukla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        :root {
            --brand-primary: #2563eb;
            --bg-dark: #0b1120;
        }

        body { 
            background-color: var(--bg-dark); 
            font-family: 'Outfit', sans-serif; 
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .glass-card { 
            background: rgba(30, 41, 59, 0.6); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        .active-tab { 
            background-color: var(--brand-primary); 
            color: white; 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); 
        }

        .voice-pulse { 
            animation: pulse 1.5s infinite; 
        }

        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.6); } 
            70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } 
        }

        .input-container {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }

        .input-container:focus-within {
            border-color: var(--brand-primary);
            background: rgba(37, 99, 235, 0.05);
        }

        /* Hide scrollbars */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Floating FAB */
        .voice-fab {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 100;
        }

        .status-toast {
            position: fixed;
            bottom: 6rem;
            right: 1.5rem;
            background: #1e293b;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-size: 0.75rem;
            border: 1px solid #334155;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .status-toast.active {
            opacity: 1;
            transform: translateY(0);
        }
    </div>
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <!-- Floating Voice Controller -->
    <div id="status-toast" class="status-toast">Listening...</div>
    <div class="voice-fab">
        <button id="mic-btn" onclick="startVoice()" class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-2xl hover:bg-blue-500 transition-all active:scale-90">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                <path d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4z"></path>
                <path d="M4 8a1 1 0 011 1 5 5 0 0010 0 1 1 0 112 0 7 7 0 01-14 0 1 1 0 011-1zM10 13a1 1 0 011 1v2a1 1 0 11-2 0v-2a1 1 0 011-1z"></path>
            </svg>
        </button>
    </div>

    <div class="w-full max-w-xl space-y-6">
        <!-- Minimal Header -->
        <header class="text-center space-y-1">
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tighter uppercase bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
                Step Fit Pro
            </h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em]">Retail Standard Calculator</p>
        </header>

        <!-- Main Conversion Card -->
        <main class="glass-card rounded-[2rem] p-5 md:p-8 space-y-6">
            <!-- Tabs -->
            <div class="flex p-1 bg-slate-900/80 rounded-xl">
                <button onclick="setType('men')" id="btn-men" class="flex-1 py-2.5 rounded-lg text-xs font-bold uppercase transition-all active-tab">Men</button>
                <button onclick="setType('women')" id="btn-women" class="flex-1 py-2.5 rounded-lg text-xs font-bold uppercase transition-all text-slate-500">Women</button>
                <button onclick="setType('kids')" id="btn-kids" class="flex-1 py-2.5 rounded-lg text-xs font-bold uppercase transition-all text-slate-500">Kids</button>
            </div>

            <!-- Inputs -->
            <div class="grid grid-cols-1 gap-4">
                <!-- Master CM -->
                <div class="input-container rounded-2xl p-4 space-y-1">
                    <div class="flex justify-between items-center">
                        <span class="text-[9px] font-bold text-blue-400 uppercase tracking-widest">Foot Length (CM)</span>
                        <span id="range-hint" class="text-[8px] text-slate-600 font-bold">24.0-29.3</span>
                    </div>
                    <input type="number" step="0.1" id="size-cm" placeholder="0.0" 
                        class="w-full bg-transparent text-4xl font-extrabold outline-none text-white placeholder:text-slate-800"
                        oninput="lookup('cm', this.value)">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="input-container rounded-2xl p-3 space-y-1">
                        <span class="text-[9px] font-bold text-orange-400 uppercase tracking-widest">India / UK</span>
                        <input type="number" step="0.5" id="size-in" placeholder="0" 
                            class="w-full bg-transparent text-xl font-bold outline-none text-white"
                            oninput="lookup('in', this.value)">
                    </div>
                    <div class="input-container rounded-2xl p-3 space-y-1">
                        <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">US / CA</span>
                        <input type="number" step="0.5" id="size-us" placeholder="0" 
                            class="w-full bg-transparent text-xl font-bold outline-none text-white"
                            oninput="lookup('us', this.value)">
                    </div>
                </div>

                <div class="input-container rounded-2xl p-3 space-y-1">
                    <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Europe (EU)</span>
                    <input type="number" step="1" id="size-eu" placeholder="0" 
                        class="w-full bg-transparent text-xl font-bold outline-none text-white"
                        oninput="lookup('eu', this.value)">
                </div>
            </div>

            <!-- Clear Action -->
            <button onclick="clearAll()" class="w-full py-3 rounded-xl bg-slate-800/40 border border-slate-700/50 text-[10px] font-bold uppercase tracking-widest text-slate-500 hover:text-white hover:bg-red-500/20 transition-all">
                Reset All
            </button>
        </main>

        <!-- Dynamic Reference (Collapsible for Clutter-free UI) -->
        <section class="space-y-3">
            <button onclick="toggleSection('ref-table')" class="w-full flex items-center justify-between px-4 py-3 bg-slate-900/40 rounded-xl border border-white/5 group">
                <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400 group-hover:text-white transition-colors">Retail Reference Chart</span>
                <svg id="arrow-ref" class="w-4 h-4 text-slate-600 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            </button>
            <div id="ref-table" class="hidden overflow-hidden transition-all duration-300">
                <div class="glass-card rounded-2xl p-4">
                    <div class="overflow-x-auto no-scrollbar">
                        <table class="w-full text-[10px] text-left">
                            <thead class="text-slate-500 border-b border-white/5 uppercase">
                                <tr>
                                    <th class="pb-2">CM</th>
                                    <th class="pb-2">EU</th>
                                    <th class="pb-2">US</th>
                                    <th class="pb-2 text-orange-400">IN</th>
                                </tr>
                            </thead>
                            <tbody id="table-body" class="text-slate-400"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <button onclick="toggleSection('standards')" class="w-full flex items-center justify-between px-4 py-3 bg-slate-900/40 rounded-xl border border-white/5 group">
                <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400 group-hover:text-white transition-colors">International Standards</span>
                <svg id="arrow-std" class="w-4 h-4 text-slate-600 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            </button>
            <div id="standards" class="hidden space-y-2 p-1">
                <div class="grid grid-cols-2 gap-2 text-[9px] uppercase tracking-tighter">
                    <div class="bg-slate-900/60 p-3 rounded-lg border border-white/5">
                        <p class="text-blue-400 font-bold mb-1">MondoPoint</p>
                        <p class="text-slate-500 leading-tight">Metric length in CM/MM.</p>
                    </div>
                    <div class="bg-slate-900/60 p-3 rounded-lg border border-white/5">
                        <p class="text-orange-400 font-bold mb-1">Barleycorn</p>
                        <p class="text-slate-500 leading-tight">UK/IN: 1 size = 1/3 inch.</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Minimal Footer -->
        <footer class="text-center pt-8 opacity-40 hover:opacity-100 transition-opacity">
            <p class="text-[9px] font-bold uppercase tracking-[0.3em] mb-1">Arvind Kumar Shukla</p>
            <a href="tel:9616417485" class="text-xs font-bold text-blue-500">9616417485</a>
        </footer>
    </div>

    <script>
        let currentType = 'men';
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = SpeechRecognition ? new SpeechRecognition() : null;

        const masterData = {
            men: [
                {cm: 24.0, eu: 38, us: 5, in: 4}, {cm: 24.7, eu: 39, us: 6, in: 5},
                {cm: 25.3, eu: 40, us: 7, in: 6}, {cm: 26.0, eu: 41, us: 8, in: 7},
                {cm: 26.7, eu: 42, us: 9, in: 8}, {cm: 27.3, eu: 43, us: 10, in: 9},
                {cm: 28.0, eu: 44, us: 11, in: 10}, {cm: 28.7, eu: 45, us: 12, in: 11},
                {cm: 29.3, eu: 46, us: 13, in: 12}
            ],
            women: [
                {cm: 22.0, eu: 35, us: 4, in: 2}, {cm: 22.7, eu: 36, us: 5, in: 3},
                {cm: 23.3, eu: 37, us: 6, in: 4}, {cm: 24.0, eu: 38, us: 6, in: 5},
                {cm: 24.7, eu: 39, us: 7, in: 6}, {cm: 25.3, eu: 40, us: 8, in: 7},
                {cm: 26.0, eu: 41, us: 9, in: 8}, {cm: 26.7, eu: 42, us: 10, in: 9},
                {cm: 27.3, eu: 43, us: 11, in: 10}
            ],
            kids: [
                {cm: 14.0, eu: 23, us: 6, in: 5}, {cm: 14.7, eu: 24, us: 7, in: 6},
                {cm: 15.3, eu: 25, us: 8, in: 7}, {cm: 16.0, eu: 26, us: 9, in: 8},
                {cm: 16.7, eu: 27, us: 10, in: 9}, {cm: 17.3, eu: 28, us: 11, in: 10},
                {cm: 18.0, eu: 29, us: 12, in: 11}, {cm: 18.7, eu: 30, us: 13, in: 12},
                {cm: 19.3, eu: 31, us: 1, in: 13}, {cm: 20.0, eu: 32, us: 2, in: 1},
                {cm: 20.7, eu: 33, us: 3, in: 2}, {cm: 21.3, eu: 34, us: 4, in: 3}
            ]
        };

        function setType(t) {
            currentType = t;
            ['men', 'women', 'kids'].forEach(b => {
                const el = document.getElementById('btn-'+b);
                el.className = (b===t) ? 'flex-1 py-2.5 rounded-lg text-xs font-bold uppercase transition-all active-tab' : 'flex-1 py-2.5 rounded-lg text-xs font-bold uppercase transition-all text-slate-500';
            });
            const range = masterData[t];
            document.getElementById('range-hint').innerText = `${range[0].cm}-${range[range.length-1].cm}`;
            renderTable();
            clearAll();
        }

        function renderTable() {
            const body = document.getElementById('table-body');
            body.innerHTML = masterData[currentType].map(row => `
                <tr class="border-b border-white/5">
                    <td class="py-2 text-blue-400 font-bold">${row.cm}</td>
                    <td class="py-2">${row.eu}</td>
                    <td class="py-2">${row.us}</td>
                    <td class="py-2 text-orange-400 font-bold">${row.in}</td>
                </tr>
            `).join('');
        }

        function toggleSection(id) {
            const el = document.getElementById(id);
            const arrow = document.getElementById('arrow-' + (id.split('-')[0]));
            el.classList.toggle('hidden');
            if(arrow) arrow.classList.toggle('rotate-180');
        }

        function lookup(source, val) {
            if(val === "") return;
            const v = parseFloat(val);
            const dataset = masterData[currentType];
            let match;
            if (source === 'cm') {
                match = dataset.find(d => d.cm >= v) || dataset[dataset.length-1];
            } else {
                match = dataset.find(d => d[source] == v) || dataset.reduce((prev, curr) => Math.abs(curr[source] - v) < Math.abs(prev[source] - v) ? curr : prev);
            }
            if(match) updateFields(match);
        }

        function updateFields(data) {
            const ids = ['cm', 'in', 'us', 'eu'];
            ids.forEach(id => {
                const el = document.getElementById('size-' + id);
                if (document.activeElement !== el) el.value = data[id];
            });
        }

        function clearAll() {
            ['cm', 'in', 'us', 'eu'].forEach(id => document.getElementById('size-'+id).value = '');
        }

        function startVoice() {
            if(!recognition) return alert("Mic not supported");
            recognition.start();
            recognition.onstart = () => {
                document.getElementById('mic-btn').classList.add('voice-pulse');
                document.getElementById('status-toast').innerText = "Listening...";
                document.getElementById('status-toast').classList.add('active');
            };
            recognition.onresult = (e) => {
                const transcript = e.results[0][0].transcript;
                const num = transcript.match(/\d+(\.\d+)?/);
                if(num) {
                    const val = num[0];
                    if (parseFloat(val) > 15) {
                        document.getElementById('size-cm').value = val;
                        lookup('cm', val);
                    } else {
                        document.getElementById('size-in').value = val;
                        lookup('in', val);
                    }
                    document.getElementById('status-toast').innerText = "Found: " + val;
                }
            };
            recognition.onend = () => {
                document.getElementById('mic-btn').classList.remove('voice-pulse');
                setTimeout(() => document.getElementById('status-toast').classList.remove('active'), 2000);
            };
        }

        document.addEventListener('DOMContentLoaded', () => setType('men'));
    </script>
</body>
</html>

```
